appId: com.fleet.app
productName: Fleet
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!reference/**'
  - '!docs/**'
extraResources:
  - from: hooks/bin/
    to: hooks/
  - from: resources/mascots/
    to: resources/mascots/
  - from: resources/pi-extensions/
    to: pi-extensions/
  - from: resources/pi-skills/
    to: pi-skills/
  # Chat's SkillManager loads bundled skills from <resourcesPath>/resources/*.
  # pi-skills is copied here too (in addition to the top-level pi-skills/ that
  # the Pi agent reads) so the chat slash menu sees them in packaged builds.
  - from: resources/chat-skills/
    to: resources/chat-skills/
  - from: resources/pi-skills/
    to: resources/pi-skills/
asarUnpack:
  - resources/**
  - node_modules/onnxruntime-node/**
  - node_modules/sqlite-vec/**
  - node_modules/sqlite-vec-*/**
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: Fleet
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: AppImage
      arch:
        - x64
  maintainer: Khang Nguyen <khang859@users.noreply.github.com>
  vendor: Fleet
  synopsis: Terminal multiplexer for AI coding agents
  description: A lightweight, cross-platform terminal multiplexer desktop app for developers running multiple AI coding agents simultaneously.
  category: Development
  executableName: fleet
appImage:
  artifactName: ${name}-${version}.${ext}
deb:
  artifactName: ${name}_${version}_${arch}.${ext}
rpm:
  artifactName: ${name}-${version}.${arch}.${ext}
npmRebuild: true
publish:
  provider: github
  owner: khang859
  repo: fleet
