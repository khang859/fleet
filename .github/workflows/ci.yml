name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: npm ci
      - run: npm rebuild better-sqlite3
      - name: Build hook binary
        run: npm run build:hook
      - name: Test hook binary
        run: cd hooks/fleet-copilot-go && go test -v -count=1 ./...
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test
