name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm ci
      - run: npm rebuild better-sqlite3
      - name: Build hook binary
        run: npm run build:hook
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test
