name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches package.json
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch: tag=v$TAG but package.json=$PKG"
            exit 1
          fi

  release-mac-arm64:
    needs: [verify-version]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild native Electron deps (arm64)
        run: npx electron-builder install-app-deps --arch arm64
      - name: Build app
        run: npx electron-vite build
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Package, sign, notarize and publish (arm64)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 40
          retry_wait_seconds: 30
          command: npx electron-builder --mac --arm64 --publish always --config /tmp/release-extra.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-mac-x64:
    needs: [verify-version]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild native Electron deps (x64)
        run: npx electron-builder install-app-deps --arch x64
      - name: Build app
        run: npx electron-vite build
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Package, sign, notarize and publish (x64)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 40
          retry_wait_seconds: 30
          command: npx electron-builder --mac --x64 --publish always --config /tmp/release-extra.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-win:
    needs: [verify-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts $env:TEMP\release-extra.json
        shell: pwsh
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --win --publish always --config $env:TEMP\release-extra.json
        shell: pwsh

  release-linux:
    needs: [verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --linux AppImage --publish always --config /tmp/release-extra.json

  publish-release:
    needs: [release-mac-arm64, release-mac-x64, release-win, release-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Merge arm64 into latest-mac.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          ARM64_ZIP="Fleet-${VERSION}-arm64-mac.zip"

          # Download arm64 zip to compute checksum and size
          gh release download "$TAG" --repo "$REPO" --pattern "$ARM64_ZIP" -D /tmp/
          ARM64_SHA512=$(openssl dgst -sha512 -binary "/tmp/${ARM64_ZIP}" | base64 -w 0)
          ARM64_SIZE=$(wc -c < "/tmp/${ARM64_ZIP}" | tr -d ' ')

          # Download the latest-mac.yml published by whichever arch job finished last
          gh release download "$TAG" --repo "$REPO" --pattern "latest-mac.yml" -D /tmp/ --clobber

          # Insert arm64 entry into the files list so MacUpdater can filter by arch
          python3 - <<PYEOF
import yaml

with open('/tmp/latest-mac.yml') as f:
    data = yaml.safe_load(f)

arm64_entry = {
    'url': '${ARM64_ZIP}',
    'sha512': '${ARM64_SHA512}',
    'size': int('${ARM64_SIZE}')
}

urls = [entry.get('url', '') for entry in data.get('files', [])]
if '${ARM64_ZIP}' not in urls:
    data['files'].insert(0, arm64_entry)

with open('/tmp/latest-mac.yml', 'w') as f:
    yaml.dump(data, f, default_flow_style=False, allow_unicode=True, sort_keys=False)

print('Merged arm64 entry into latest-mac.yml')
PYEOF

          gh release upload "$TAG" --repo "$REPO" /tmp/latest-mac.yml --clobber

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
