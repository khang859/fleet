name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches package.json
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch: tag=v$TAG but package.json=$PKG"
            exit 1
          fi

  release-mac-arm64:
    needs: [verify-version]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build hook binary
        run: npm run build:hook
      - name: Rebuild native Electron deps (arm64)
        run: npx electron-builder install-app-deps --arch arm64
      - name: Build app
        run: npx electron-vite build
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Package, sign, notarize and publish (arm64)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 40
          retry_wait_seconds: 30
          command: npx electron-builder --mac --arm64 --publish always --config /tmp/release-extra.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-mac-x64:
    needs: [verify-version]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build hook binary
        run: npm run build:hook
      - name: Rebuild native Electron deps (x64)
        run: npx electron-builder install-app-deps --arch x64
      - name: Build app
        run: npx electron-vite build
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Package, sign, notarize and publish (x64)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 40
          retry_wait_seconds: 30
          command: npx electron-builder --mac --x64 --publish always --config /tmp/release-extra.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-win:
    needs: [verify-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build hook binary
        run: sh scripts/build-hook.sh
        shell: bash
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts $env:TEMP\release-extra.json
        shell: pwsh
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --win --publish always --config $env:TEMP\release-extra.json
        shell: pwsh

  release-linux:
    needs: [verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build hook binary
        run: npm run build:hook
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --linux AppImage --publish always --config /tmp/release-extra.json

  publish-release:
    needs: [release-mac-arm64, release-mac-x64, release-win, release-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Regenerate latest-mac.yml from actual artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"

          # Download the existing manifest to preserve releaseNotes and releaseDate
          gh release download "$TAG" --repo "$REPO" --pattern "latest-mac.yml" -D /tmp/ --clobber

          # Download all mac ZIP and DMG artifacts
          gh release download "$TAG" --repo "$REPO" --pattern "Fleet-*-mac.zip" -D /tmp/
          gh release download "$TAG" --repo "$REPO" --pattern "fleet-*-arm64.dmg" -D /tmp/
          gh release download "$TAG" --repo "$REPO" --pattern "fleet-*-x64.dmg" -D /tmp/

          # Compute sha512 and size for each artifact
          compute_meta() {
            local file="$1"
            local sha512 size
            sha512=$(openssl dgst -sha512 -binary "$file" | base64 -w 0)
            size=$(wc -c < "$file" | tr -d ' ')
            echo "$sha512 $size"
          }

          ARM64_ZIP="Fleet-${VERSION}-arm64-mac.zip"
          X64_ZIP="Fleet-${VERSION}-mac.zip"
          ARM64_DMG="fleet-${VERSION}-arm64.dmg"
          X64_DMG="fleet-${VERSION}-x64.dmg"

          read ARM64_ZIP_SHA ARM64_ZIP_SIZE <<< "$(compute_meta "/tmp/${ARM64_ZIP}")"
          read X64_ZIP_SHA X64_ZIP_SIZE <<< "$(compute_meta "/tmp/${X64_ZIP}")"
          read ARM64_DMG_SHA ARM64_DMG_SIZE <<< "$(compute_meta "/tmp/${ARM64_DMG}")"
          read X64_DMG_SHA X64_DMG_SIZE <<< "$(compute_meta "/tmp/${X64_DMG}")"

          echo "ARM64_ZIP=${ARM64_ZIP}" >> $GITHUB_ENV
          echo "ARM64_ZIP_SHA=${ARM64_ZIP_SHA}" >> $GITHUB_ENV
          echo "ARM64_ZIP_SIZE=${ARM64_ZIP_SIZE}" >> $GITHUB_ENV
          echo "X64_ZIP=${X64_ZIP}" >> $GITHUB_ENV
          echo "X64_ZIP_SHA=${X64_ZIP_SHA}" >> $GITHUB_ENV
          echo "X64_ZIP_SIZE=${X64_ZIP_SIZE}" >> $GITHUB_ENV
          echo "ARM64_DMG=${ARM64_DMG}" >> $GITHUB_ENV
          echo "ARM64_DMG_SHA=${ARM64_DMG_SHA}" >> $GITHUB_ENV
          echo "ARM64_DMG_SIZE=${ARM64_DMG_SIZE}" >> $GITHUB_ENV
          echo "X64_DMG=${X64_DMG}" >> $GITHUB_ENV
          echo "X64_DMG_SHA=${X64_DMG_SHA}" >> $GITHUB_ENV
          echo "X64_DMG_SIZE=${X64_DMG_SIZE}" >> $GITHUB_ENV

      - name: Build latest-mac.yml from scratch with correct hashes
        shell: python3 {0}
        run: |
          import yaml, os

          # Read existing manifest only for releaseNotes and releaseDate
          with open('/tmp/latest-mac.yml') as f:
              old = yaml.safe_load(f)

          version = os.environ.get('GITHUB_REF_NAME', '').lstrip('v') or old.get('version', '')
          release_notes = old.get('releaseNotes', '')
          release_date = old.get('releaseDate', '')

          # Build files list from freshly computed hashes
          files = [
              {
                  'url': os.environ['ARM64_ZIP'],
                  'sha512': os.environ['ARM64_ZIP_SHA'],
                  'size': int(os.environ['ARM64_ZIP_SIZE']),
              },
              {
                  'url': os.environ['X64_ZIP'],
                  'sha512': os.environ['X64_ZIP_SHA'],
                  'size': int(os.environ['X64_ZIP_SIZE']),
              },
              {
                  'url': os.environ['ARM64_DMG'],
                  'sha512': os.environ['ARM64_DMG_SHA'],
                  'size': int(os.environ['ARM64_DMG_SIZE']),
              },
              {
                  'url': os.environ['X64_DMG'],
                  'sha512': os.environ['X64_DMG_SHA'],
                  'size': int(os.environ['X64_DMG_SIZE']),
              },
          ]

          data = {
              'version': version,
              'files': files,
              'path': os.environ['ARM64_ZIP'],
              'sha512': os.environ['ARM64_ZIP_SHA'],
              'releaseNotes': release_notes,
              'releaseDate': release_date,
          }

          with open('/tmp/latest-mac.yml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True, sort_keys=False)

          print('Regenerated latest-mac.yml with verified hashes')

      - name: Upload latest-mac.yml and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" --repo "${{ github.repository }}" /tmp/latest-mac.yml --clobber
          gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
