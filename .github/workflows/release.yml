name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches package.json
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch: tag=v$TAG but package.json=$PKG"
            exit 1
          fi

  release-mac-arm64:
    needs: [verify-version]
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild native Electron deps
        run: npx electron-builder install-app-deps
      - name: Build app
        run: npx electron-vite build
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Package, sign, notarize and publish
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 20
          retry_wait_seconds: 30
          command: npx electron-builder --mac --arm64 --publish always --config /tmp/release-extra.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-mac-x64:
    needs: [verify-version]
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild native Electron deps
        run: npx electron-builder install-app-deps
      - name: Build app
        run: npx electron-vite build
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Package, sign, notarize and publish
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 20
          retry_wait_seconds: 30
          command: npx electron-builder --mac --x64 --publish always --config /tmp/release-extra.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release-win:
    needs: [verify-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts $env:TEMP\release-extra.json
        shell: pwsh
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --win --publish always --config $env:TEMP\release-extra.json
        shell: pwsh

  release-linux:
    needs: [verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Extract release notes config
        run: npx tsx scripts/extract-release-notes.ts /tmp/release-extra.json
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --linux --publish always --config /tmp/release-extra.json

  publish-release:
    needs: [release-mac-arm64, release-mac-x64, release-win, release-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
